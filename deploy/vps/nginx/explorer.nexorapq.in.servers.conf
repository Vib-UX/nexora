# Blockscout HTTPS frontend + JSON-RPC API on a single host.
# Forwards to the internal blockscout-proxy container (chain/docker-compose.yml,
# `--profile explorer`) which routes /api -> backend, / -> frontend.
# TLS: certbot --nginx -d explorer.nexorapq.in
#
# Requires nexora-websocket-upgrade.map.conf to be included in http context
# (defines $connection_upgrade). Skip that include if another vhost on the
# same nginx already defines the map.

server {
    listen 80;
    listen [::]:80;
    server_name explorer.nexorapq.in;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
