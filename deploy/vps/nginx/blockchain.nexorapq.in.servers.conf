# Nitro JSON-RPC + WebSocket server blocks (HTTP). Requires
# nexora-websocket-upgrade.map.conf unless $connection_upgrade is already defined.
# TLS: certbot --nginx -d blockchain.nexorapq.in -d ws.blockchain.nexorapq.in

server {
    listen 80;
    listen [::]:80;
    server_name blockchain.nexorapq.in;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8547;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name ws.blockchain.nexorapq.in;

    location / {
        proxy_pass http://127.0.0.1:8548;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        proxy_buffering off;
    }
}
