# Local Nexora devnet — single Nitro node in `--dev` mode.
#
# ChainId is 412346 (Nitro's built-in dev chain).
#
# In `--dev` mode Nitro pre-funds a known account:
#   address     : 0x3f1Eae7D46d88F08fc2F8ed27FCb2AB183EB2d0E
#   private key : 0xb6b15c8cb491557369f3c7d2c287b053eb229daa9c22138887752191c9520659
# This is the deployer used by `scripts/deploy-all.ts`.
#
# Block / tx exploration is handled by the dashboard itself
# (`/tx/[hash]` route). Stock Otterscan can't run against Nitro because
# Otterscan requires the Erigon-only `erigon_*` and `ots_*` RPC
# namespaces, which Nitro does not expose. The dashboard uses the
# Geth-compatible `debug_traceTransaction` (Geth `callTracer`) Nitro
# does implement and decodes the Falcon-512 verifier call inline.
#
# Ports bind to loopback only so JSON-RPC / WS are not exposed publicly;
# use nginx on 443 (see deploy/vps/) for TLS termination.
#
# Data uses a named Docker volume so `sudo docker-compose` does not leave
# ./data owned by root (which breaks Nitro: jwtsecret permission denied).
services:
  nitro:
    image: offchainlabs/nitro-node:v3.2.1-d81324d
    container_name: nexora-nitro
    restart: unless-stopped
    ports:
      - "127.0.0.1:8547:8547"
      - "127.0.0.1:8548:8548"
    volumes:
      - nexora-nitro-data:/home/user/.arbitrum
    command:
      - --dev
      - --http.addr=0.0.0.0
      - --http.port=8547
      - --http.api=net,web3,eth,debug,arb,arbdebug
      - --http.corsdomain=*
      - --http.vhosts=*
      - --ws.addr=0.0.0.0
      - --ws.port=8548
      - --ws.api=net,web3,eth,arb,arbdebug
      - --ws.origins=*

volumes:
  nexora-nitro-data:
